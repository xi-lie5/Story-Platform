  <!-- JavaScript -->
  <script src="assets/js/auth.js"></script>
  <script>
    // 初始化AuthUI
    AuthUI.init();

    // 移动端菜单功能
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    if (mobileMenuButton && mobileMenu) {
      mobileMenuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
    }

    // 全局变量
    let currentStory = null;
    let currentNode = null;
    let readingHistory = [];
    let fontSize = 'medium';
    let isDarkMode = false;

    // 工具函数
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        storyId: params.get('storyId') || params.get('id'), // 支持storyId和id两种参数
        nodeId: params.get('node') || 'root'
      };
    }

    function updateUrl(storyId, nodeId) {
      const url = new URL(window.location);
      url.searchParams.set('id', storyId);
      url.searchParams.set('node', nodeId);
      window.history.pushState({}, '', url);
    }

    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 flex items-center transition-all duration-300 transform translate-y-10 opacity-0`;

      if (type === 'success') {
        notification.classList.add('bg-green-50', 'border', 'border-green-200', 'text-green-700');
        notification.innerHTML = `<i class="fa fa-check-circle mr-2"></i>${message}`;
      } else if (type === 'error') {
        notification.classList.add('bg-red-50', 'border', 'border-red-200', 'text-red-700');
        notification.innerHTML = `<i class="fa fa-exclamation-circle mr-2"></i>${message}`;
      } else {
        notification.classList.add('bg-blue-50', 'border', 'border-blue-200', 'text-blue-700');
        notification.innerHTML = `<i class="fa fa-info-circle mr-2"></i>${message}`;
      }

      document.body.appendChild(notification);
      setTimeout(() => notification.classList.remove('translate-y-10', 'opacity-0'), 10);
      setTimeout(() => {
        notification.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    // 获取认证 token（导出/埋点接口需要登录）
    function getAuthToken() {
      const token = localStorage.getItem('token') || sessionStorage.getItem('token') || '';
      return token.startsWith('Bearer ') ? token.substring(7) : token;
    }

    // 导出故事为 PDF / EPUB：后端 GET /stories/:id/export?format=xxx 返回文件流，
    // 需带上 Authorization，因此用 fetch 取 blob 再触发浏览器下载。
    async function exportStory(format) {
      const params = getUrlParams();
      const token = getAuthToken();
      if (!token) {
        showNotification('请先登录后再导出故事', 'error');
        return;
      }
      const btn = document.getElementById('export-btn');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
      btn.disabled = true;
      try {
        const url = `http://localhost:5000/api/v1/stories/${params.storyId}/export?format=${format}`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        if (!resp.ok) {
          let msg = '导出失败';
          try { const j = await resp.json(); msg = j.message || msg; } catch (e) {}
          throw new Error(msg);
        }
        const blob = await resp.blob();
        const title = (currentStory && currentStory.title) ? currentStory.title : ('story-' + params.storyId);
        const ext = format === 'epub' ? 'epub' : 'pdf';
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${title}.${ext}`;
        document.body.appendChild(link);
        link.click();
        setTimeout(() => { URL.revokeObjectURL(link.href); link.remove(); }, 1000);
        showNotification(`已开始下载 ${ext.toUpperCase()} 文件`, 'success');
      } catch (error) {
        showNotification(error.message || '导出失败', 'error');
      } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    }

    // 阅读埋点：记录 from_node → to_node 的跳转，供作者查看阅读分析。
    // 仅登录用户上报；失败静默（不影响阅读体验）。
    function recordReadEvent(fromNodeId, toNodeId, choiceText) {
      const token = getAuthToken();
      if (!token || !toNodeId) return;
      const params = getUrlParams();
      // AI 故事与手动故事的节点都在 story_nodes 表；临时故事(local_)跳过
      if (!params.storyId || String(params.storyId).startsWith('local_')) return;
      fetch(`http://localhost:5000/api/v1/stories/${params.storyId}/read-events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({
          fromNodeId: fromNodeId != null ? String(fromNodeId) : null,
          toNodeId: String(toNodeId),
          choiceText: choiceText || null
        })
      }).catch(() => {});
    }

    // ── 故事评分 ──
    let storyUserRating = 0;
    let storyAvgRating = 0;
    let storyRatingCount = 0;
    // 各星级的反馈文案
    const RATING_LABELS = { 1: '拉完了...', 2: '有点勉强…', 3: '一般般~', 4: '挺不错！', 5: '夯爆了！' };

    // 星星只创建一次并绑定监听；悬停/选中仅切换 class，避免重建 DOM 导致 click 失效
    function buildStars() {
      const box = document.getElementById('story-stars');
      if (!box || box.dataset.built === '1') return;
      let html = '';
      for (let i = 1; i <= 5; i++) {
        html += `<i class="fa fa-star cursor-pointer transition-colors text-slate-300" data-val="${i}"></i>`;
      }
      box.innerHTML = html;
      box.dataset.built = '1';
      box.querySelectorAll('[data-val]').forEach(function (star) {
        const v = parseInt(star.dataset.val, 10);
        star.addEventListener('mouseenter', function () { highlightStars(v); showRatingHint(v); });
        star.addEventListener('click', function () { rateStory(v); });
      });
      // 鼠标移出整块时恢复到当前评分状态
      box.addEventListener('mouseleave', function () {
        highlightStars(storyUserRating || Math.round(storyAvgRating));
        updateRatingSummary();
      });
    }

    // 高亮前 n 颗星（不重建 DOM）
    function highlightStars(n) {
      document.querySelectorAll('#story-stars [data-val]').forEach(function (star) {
        const v = parseInt(star.dataset.val, 10);
        star.classList.toggle('text-amber-400', v <= n);
        star.classList.toggle('text-slate-300', v > n);
      });
    }

    // 悬停时的即时文案提示
    function showRatingHint(n) {
      const el = document.getElementById('story-rating-summary');
      if (el) el.textContent = `${n} 星 · ${RATING_LABELS[n]}`;
    }

    function updateRatingSummary() {
      const el = document.getElementById('story-rating-summary');
      if (!el) return;
      let txt = '';
      if (storyUserRating) txt += `你的评分：${storyUserRating} 星 ${RATING_LABELS[storyUserRating]} · `;
      txt += storyRatingCount ? `平均 ${storyAvgRating} 分 · ${storyRatingCount} 人评分` : '暂无评分';
      el.textContent = txt;
    }

    async function loadStoryRating() {
      const params = getUrlParams();
      if (!params.storyId || String(params.storyId).startsWith('local_')) {
        document.getElementById('rating-block').style.display = 'none';
        return;
      }
      buildStars();
      try {
        const token = getAuthToken();
        const headers = token ? { Authorization: `Bearer ${token}` } : {};
        const resp = await fetch(`http://localhost:5000/api/v1/interactions/stories/${params.storyId}/rating`, { headers });
        const result = await resp.json();
        if (resp.ok && result.success && result.data) {
          storyAvgRating = Number(result.data.averageRating || 0);
          storyRatingCount = result.data.ratingCount || 0;
          storyUserRating = result.data.userRating ? result.data.userRating.rating : 0;
        }
      } catch (e) { /* 忽略，展示默认 */ }
      highlightStars(storyUserRating || Math.round(storyAvgRating));
      updateRatingSummary();
    }

    async function rateStory(rating) {
      const params = getUrlParams();
      const token = getAuthToken();
      if (!token) { showNotification('请先登录后再评分', 'error'); return; }
      // 立即给出视觉反馈
      highlightStars(rating);
      try {
        const resp = await fetch(`http://localhost:5000/api/v1/interactions/stories/${params.storyId}/rate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ rating: rating })
        });
        const result = await resp.json();
        if (!resp.ok || !result.success) throw new Error(result.message || '评分失败');
        storyUserRating = rating;
        if (result.data) {
          storyAvgRating = Number(result.data.averageRating || storyAvgRating);
          storyRatingCount = result.data.ratingCount || storyRatingCount;
        }
        highlightStars(storyUserRating);
        updateRatingSummary();
        showNotification(`评分成功：${rating} 星 · ${RATING_LABELS[rating]}`, 'success');
      } catch (e) {
        // 失败时回退到之前的评分显示
        highlightStars(storyUserRating || Math.round(storyAvgRating));
        updateRatingSummary();
        showNotification(e.message || '评分失败', 'error');
      }
    }

    // ── 评论功能 ──
    let commentPage = 1;
    let commentTotalPages = 1;

    function getCurrentUser() {
      try { return (AuthUI.getAuthState() || {}).userInfo || null; } catch (e) { return null; }
    }

    function initCommentUI() {
      const user = getCurrentUser();
      const formWrap = document.getElementById('comment-form-wrap');
      const loginTip = document.getElementById('comment-login-tip');
      if (user) { formWrap.classList.remove('hidden'); loginTip.classList.add('hidden'); }
      else { formWrap.classList.add('hidden'); loginTip.classList.remove('hidden'); }

      const input = document.getElementById('comment-input');
      if (input) input.addEventListener('input', function () {
        document.getElementById('comment-len').textContent = this.value.length;
      });
      const submitBtn = document.getElementById('submit-comment-btn');
      if (submitBtn) submitBtn.addEventListener('click', submitComment);
      const moreBtn = document.getElementById('load-more-comments');
      if (moreBtn) moreBtn.addEventListener('click', function () { loadComments(commentPage + 1, true); });
    }

    async function loadComments(page, append) {
      const params = getUrlParams();
      const listEl = document.getElementById('comments-list');
      if (!params.storyId || String(params.storyId).startsWith('local_')) {
        listEl.innerHTML = '<div class="text-center text-slate-400 py-6 text-sm">该故事暂不支持评论</div>';
        return;
      }
      page = page || 1;
      try {
        const resp = await fetch(`http://localhost:5000/api/v1/stories/${params.storyId}/comments?page=${page}&limit=10`);
        const result = await resp.json();
        if (!resp.ok || !result.success) throw new Error(result.message || '加载失败');
        commentPage = result.pagination ? result.pagination.page : page;
        commentTotalPages = result.pagination ? result.pagination.pages : 1;
        const comments = result.data || [];
        const total = result.pagination ? result.pagination.total : comments.length;
        document.getElementById('comment-count').textContent = total ? `(${total})` : '';
        if (!append) listEl.innerHTML = '';
        if (page === 1 && comments.length === 0) {
          listEl.innerHTML = '<div class="text-center text-slate-400 py-6 text-sm">还没有评论，来抢沙发吧～</div>';
        } else {
          comments.forEach(function (c) { listEl.insertAdjacentHTML('beforeend', renderComment(c)); });
        }
        const moreBtn = document.getElementById('load-more-comments');
        if (commentPage < commentTotalPages) moreBtn.classList.remove('hidden'); else moreBtn.classList.add('hidden');
      } catch (e) {
        if (!append) listEl.innerHTML = `<div class="text-center text-red-500 py-6 text-sm">评论加载失败：${escapeHtml(e.message)}</div>`;
      }
    }

    function renderComment(c) {
      const user = getCurrentUser();
      const authorName = (c.author && c.author.username) || '用户';
      let avatar = (c.author && c.author.avatar) || '/avatar/default.png';
      if (!avatar.startsWith('http')) avatar = 'http://localhost:5000' + avatar;
      const canDelete = user && (String(user.userId) === String(c.userId) || user.role === 'admin');
      const timeStr = c.createdAt ? new Date(c.createdAt).toLocaleString('zh-CN') : '';
      return `
        <div class="flex gap-3 p-4 bg-slate-50 rounded-xl">
          <img src="${avatar}" alt="${escapeHtml(authorName)}" class="w-9 h-9 rounded-full border border-slate-200 flex-shrink-0"
            onerror="this.onerror=null;this.src='http://localhost:5000/avatar/default.png';">
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between gap-2">
              <span class="font-medium text-sm text-slate-800">${escapeHtml(authorName)}</span>
              <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400">${escapeHtml(timeStr)}</span>
                ${canDelete ? `<button onclick="deleteComment(${c.id})" class="text-xs text-red-400 hover:text-red-600"><i class="fa fa-trash"></i></button>` : ''}
              </div>
            </div>
            <p class="text-sm text-slate-600 mt-1 whitespace-pre-wrap break-words">${escapeHtml(c.content || '')}</p>
          </div>
        </div>`;
    }

    async function submitComment() {
      const params = getUrlParams();
      const input = document.getElementById('comment-input');
      const content = input.value.trim();
      if (!content) { showNotification('请输入评论内容', 'error'); return; }
      const token = getAuthToken();
      if (!token) { showNotification('请先登录后再评论', 'error'); return; }
      const btn = document.getElementById('submit-comment-btn');
      btn.disabled = true;
      try {
        const resp = await fetch(`http://localhost:5000/api/v1/stories/${params.storyId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ content: content })
        });
        const result = await resp.json();
        if (!resp.ok || !result.success) throw new Error(result.message || '发表失败');
        input.value = '';
        document.getElementById('comment-len').textContent = '0';
        showNotification('评论发表成功', 'success');

      } catch (e) {

        btn.disabled = false;

    async function deleteComment(commentId) {
      if (!confirm('确定删除这条评论吗？')) return;
      const token = getAuthToken();
      if (!token) { showNotification('请先登录', 'error'); return; }
      try {
        const resp = await fetch(`http://localhost:5000/api/v1/comments/${commentId}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        const result = await resp.json();
        if (!resp.ok || !result.success) throw new Error(result.message || '删除失败');
        showNotification('评论已删除', 'success');
        loadComments(1, false);
      } catch (e) {
        showNotification(e.message || '删除失败', 'error');

    // API调用函数
    async function loadStoryData(storyId) {
      try {
        const response = await fetch(`http://localhost:5000/api/v1/stories/${storyId}`);
        if (!response.ok) {
          throw new Error('故事不存在');
        }
        const data = await response.json();
        if (data.success && data.data) {
          currentStory = data.data;
          
          // 更新页面标题和故事信息
          const storyTitle = currentStory.title || '故事';
          document.getElementById('page-title').textContent = `${storyTitle} - StoryForge`;
          
          // 更新故事头部信息
          updateStoryHeader(currentStory);
          
          // 如果有节点数据，计算总节点数
          if (currentStory.nodes && Array.isArray(currentStory.nodes)) {
            currentStory.totalNodes = currentStory.nodes.length;
          }
          
          return currentStory;
        }
        return null;
      } catch (error) {
        console.error('加载故事数据失败:', error);
        showNotification('加载故事失败: ' + error.message, 'error');
        return null;
      }
    }
    
    // 更新故事头部信息
    function updateStoryHeader(story) {
      // 更新作者信息
      const authorInfo = document.getElementById('author-info');
      if (authorInfo) {
        const authorName = story.author?.username || story.author?.name || '未知作者';
        authorInfo.innerHTML = `
          <i class="fa fa-user"></i>
          <span>${escapeHtml(authorName)}</span>

      // 更新分类信息

      if (categoryInfo) {

        categoryInfo.innerHTML = `
          <i class="fa fa-tag"></i>
          <span>${escapeHtml(categoryName)}</span>
        `;
      }
      
      // 更新创作时间
      const createdTime = document.getElementById('created-time');
      if (createdTime && story.createdAt) {
        const date = new Date(story.createdAt);
        const formattedDate = date.toLocaleDateString('zh-CN', { 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric' 
        });
        createdTime.innerHTML = `
          <i class="fa fa-calendar"></i>

    async function loadStoryNodes(storyId) {
      try {
        console.log('🔍 开始加载故事节点，storyId:', storyId);
        const url = `http://localhost:5000/api/v1/storyNodes/public/stories/${storyId}/nodes`;
        console.log('🔍 请求URL:', url);
        
        // 尝试获取token（如果用户已登录）
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        const headers = {
          'Content-Type': 'application/json'
        };
        if (token) {
          // 确保token不包含Bearer前缀
          const cleanToken = token.startsWith('Bearer ') ? token.substring(7) : token;
          headers['Authorization'] = `Bearer ${cleanToken}`;
        }
        
        const response = await fetch(url, {
          headers: headers
        });
        console.log('🔍 响应状态:', response.status);
        
        if (!response.ok) {
          const errorText = await response.text();
          console.error('🔍 响应错误:', errorText);
          let errorData;
          try {
            errorData = JSON.parse(errorText);
          } catch (e) {
            errorData = { message: '无法加载故事节点' };
          }
          throw new Error(errorData.message || '无法加载故事节点');
        }
        
        const result = await response.json();
        console.log('🔍 响应数据:', result);
        
        if (result.success) {
          return result.data;
        } else {
          throw new Error(result.message || '加载节点失败');
        }
      } catch (error) {
        console.error('加载故事节点失败:', error);
        showNotification('加载故事节点失败', 'error');
        return [];
      }
    }

    // 节点加载和渲染
    async function loadNode(storyId, nodeId) {
      try {
        // 显示加载状态
        const contentEl = document.getElementById('story-content');
        contentEl.innerHTML = `
          <div class="flex items-center justify-center py-12">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
            <span class="ml-3 text-slate-600">正在加载节点内容...</span>
          </div>
        `;
        
        // 加载所有节点数据（包含分支信息）
        const nodes = await loadStoryNodes(storyId);
        if (!nodes || nodes.length === 0) {
          throw new Error('没有找到故事节点');
        }

        console.log('加载的节点数据:', nodes);
        console.log('查找节点ID:', nodeId);

        // 查找当前节点
        let targetNode = null;
        if (nodeId === 'root' || nodeId === null || nodeId === undefined) {
          // 查找根节点（使用isRoot字段）
          targetNode = nodes.find(node => node.isRoot === true || node.isRoot === 1);
          if (!targetNode) {
            // 如果没有isRoot字段，查找parentId?null的节点
          targetNode = nodes.find(node => !node.parentId);
          }
          if (!targetNode) {
            // 如果还是没有找到，使用第一个节点作为根节点
            targetNode = nodes[0];
          }
        } else {
          // 查找指定ID的节点
          targetNode = nodes.find(node => 
            node.id === nodeId || 
            node._id === nodeId || 
            node.temporaryId === nodeId ||
            String(node.id) === String(nodeId)
          );
        }

        if (!targetNode) {
          throw new Error('节点不存在');
        }

        console.log('找到目标节点:', targetNode);

        // 更新当前节点
        currentNode = targetNode;
        
        // 添加到阅读历史（避免重复添加）
        const existingHistory = readingHistory.find(h => 
          h.nodeId === targetNode.id || 
          h.nodeId === targetNode._id ||
          h.nodeId === targetNode.temporaryId
        );
        
        if (!existingHistory) {
          readingHistory.push({
            nodeId: targetNode.id || targetNode._id || targetNode.temporaryId,
            title: targetNode.title,
            timestamp: new Date()
          });
        } else {
          // 如果已存在，移除之后的所有历史记录（实现返回功能）
          const index = readingHistory.findIndex(h => 
            h.nodeId === targetNode.id || 
            h.nodeId === targetNode._id ||
            h.nodeId === targetNode.temporaryId
          );
          if (index !== -1 && index < readingHistory.length - 1) {
            readingHistory = readingHistory.slice(0, index + 1);
          }
        }

        // 更新URL
        updateUrl(storyId, targetNode.id || targetNode._id || targetNode.temporaryId);
        
        // 渲染节点内容
        renderNode(targetNode);
        
        // 更新导航
        updateNavigation();
        
        // 更新进度
        updateProgress();

      } catch (error) {
        console.error('加载节点失败:', error);
        showNotification('加载节点失败: ' + error.message, 'error');
        const contentEl = document.getElementById('story-content');
        contentEl.innerHTML = `
          <div class="text-center py-12">
            <i class="fa fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
            <p class="text-red-600 mb-2">加载节点失败</p>
            <p class="text-sm text-slate-500">${error.message}</p>
            <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
              重新加载
            </button>
          </div>
        `;
      }
    }

    // 渲染节点内容
    function renderNode(node) {
      // 更新页面标题
      const nodeTitle = node.title || '未命名节点';
      document.getElementById('page-title').textContent = `${nodeTitle} - StoryForge`;
      document.getElementById('story-title').textContent = nodeTitle;
      
      // 更新节点信息
      // 使用阅读深度（readingHistory.length）作为节点序号，而不是 node.order。
      // 因为后端对没有 order 的节点（如 AI 生成的节点）统一返回 order=1，
      // 直接用 node.order 会导致"节点1"永远不变。
      document.getElementById('node-info').innerHTML = `
        <i class="fa fa-code-fork"></i>
        <span>节点 ${readingHistory.length || node.order || 1}</span>
      `;
      
      // 计算阅读时间（假设每分钟200字）
      const contentLength = node.content ? node.content.length : 0;
      const readingMinutes = Math.max(1, Math.ceil(contentLength / 200));
      document.getElementById('reading-time').innerHTML = `
        <i class="fa fa-clock-o"></i>
        <span>约${readingMinutes}分钟阅读</span>
      `;
      
      // 更新内容
      const contentEl = document.getElementById('story-content');
      if (node.content && node.content.trim()) {
        // 处理内容，支持换行和段落
        const contentHtml = node.content
          .split('\n')
          .filter(line => line.trim())
          .map(line => `<p class="mb-6 leading-relaxed">${escapeHtml(line)}</p>`)
          .join('');
        
      contentEl.innerHTML = `
        <div class="prose prose-lg max-w-none">
            ${contentHtml}
          </div>
        `;
      } else {
        contentEl.innerHTML = `
          <div class="text-center py-12 text-slate-500">
            <i class="fa fa-file-text-o text-4xl mb-4"></i>
            <p>暂无内容</p>
        </div>
      `;
      }
      
      // 渲染选择（分支）
      renderChoices(node);
      
      // 处理结束节点
      if (node.type === 'end' || (!node.choices || node.choices.length === 0)) {
        // 如果是结束节点或没有选择，显示结束提示
        const choicesSection = document.getElementById('choices-section');
        choicesSection.classList.add('hidden');
        
        // 显示结束提示
        if (node.type === 'end') {
          contentEl.innerHTML += `
            <div class="mt-8 p-6 bg-gradient-to-r from-primary/10 to-secondary/10 rounded-xl border border-primary/20 text-center">
              <i class="fa fa-flag-checkered text-3xl text-primary mb-3"></i>
              <h3 class="text-xl font-bold text-gray-900 mb-2">故事结束</h3>
              <p class="text-slate-600 mb-4">感谢阅读这个故事！</p>
            </div>
          `;
        }
      }
      
      // 应用字体大小
      applyFontSize();
    }
    
    // HTML转义函数
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // 渲染选择按钮
    function renderChoices(node) {
      const choicesSection = document.getElementById('choices-section');
      const choicesContainer = document.getElementById('choices-container');
      
      // 检查是否有选择项
      const choices = node.choices || [];
      
      if (choices.length === 0 || node.type === 'end') {
        choicesSection.classList.add('hidden');
        return;
      }
      
      choicesSection.classList.remove('hidden');
      choicesContainer.innerHTML = '';
      
      choices.forEach((choice, index) => {
        const choiceCard = document.createElement('div');
        choiceCard.className = 'choice-card p-6 bg-slate-50 rounded-xl border-2 border-slate-200 hover:border-primary hover:bg-primary/5 cursor-pointer transition-all';
        
        const choiceText = choice.text || choice.context || '继续';
        const targetNodeId = choice.targetNodeId || choice.target_node_id;
        
        choiceCard.innerHTML = `
          <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-full flex items-center justify-center font-bold text-lg shadow-md">
              ${String.fromCharCode(65 + index)}
            </div>
            <div class="flex-1">
              <h3 class="font-bold text-lg mb-2 text-gray-900">${escapeHtml(choiceText)}</h3>
              ${choice.description ? `<p class="text-slate-600 text-sm">${escapeHtml(choice.description)}</p>` : ''}
              ${choice.targetNode && choice.targetNode.title ? `<p class="text-xs text-slate-500 mt-2">→ ${escapeHtml(choice.targetNode.title)}</p>` : ''}
            </div>
            <div class="flex-shrink-0 pt-1">
              <i class="fa fa-chevron-right text-slate-400 text-xl"></i>
            </div>
          </div>
        `;
        
        choiceCard.addEventListener('click', () => {
          if (targetNodeId) {
            choiceCard.classList.add('opacity-75');
            handleChoice(choice, node);
          } else {
            showNotification('该选择暂无后续内容', 'info');
          }
        });
        
        choicesContainer.appendChild(choiceCard);
      });
    }

    // 处理选择
    async function handleChoice(choice, currentNode) {
      const targetNodeId = choice.targetNodeId || choice.target_node_id;
      
      if (!targetNodeId) {
        showNotification('该选择暂无后续内容', 'info');
        return;
      }
      
      console.log('处理选择:', choice);
      console.log('当前节点:', currentNode);
      console.log('目标节点ID:', targetNodeId);
      
      const params = getUrlParams();
      
      // 阅读埋点：记录从当前节点经由该选择跳转到目标节点
      const fromId = currentNode ? (currentNode.id || currentNode._id || currentNode.temporaryId) : null;
      const choiceText = choice.text || choice.context || '';
      recordReadEvent(fromId, targetNodeId, choiceText);
      
      // 显示加载提示
      showNotification('正在加载下一个节点...', 'info');
      
      // 滚动到顶部，提供更好的用户体验
      window.scrollTo({ top: 0, behavior: 'smooth' });
      
      // 加载目标节点
      await loadNode(params.storyId, targetNodeId);
    }

    // 更新导航
    function updateNavigation() {
      const navSection = document.getElementById('navigation-section');
      const prevBtn = document.getElementById('prev-node-btn');
      const pathIndicator = document.getElementById('path-indicator');
      
      // 只有在不是根节点时才显示导航
      if (readingHistory.length > 1) {
      navSection.classList.remove('hidden');
      } else {
        navSection.classList.add('hidden');
      }
      
      // 更新返回按钮状态
      if (readingHistory.length <= 1) {
        prevBtn.disabled = true;
        prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
      } else {
        prevBtn.disabled = false;
        prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        prevBtn.onclick = () => {
          // 从阅读历史中移除当前节点，返回到上一个节点
          readingHistory.pop(); // 移除当前节点
          const prevNode = readingHistory[readingHistory.length - 1];
          if (prevNode) {
          const params = getUrlParams();
          loadNode(params.storyId, prevNode.nodeId);
          }
        };
      }
      
      // 更新路径指示器（最多显示5个节点）
      const displayHistory = readingHistory.slice(-5);
      pathIndicator.innerHTML = displayHistory.map((item, index) => {
        const actualIndex = readingHistory.length - displayHistory.length + index;
        const isLast = actualIndex === readingHistory.length - 1;
        const displayTitle = item.title && item.title.length > 10 
          ? item.title.substring(0, 10) + '...' 
          : item.title || '节点';
        
        return `
          <div class="flex items-center gap-1" title="${escapeHtml(item.title || '节点')}">
            <div class="w-2 h-2 rounded-full ${isLast ? 'bg-primary ring-2 ring-primary/30' : 'bg-slate-300'} transition-all"></div>
            ${index < displayHistory.length - 1 ? '<i class="fa fa-chevron-right text-xs text-slate-400"></i>' : ''}
        </div>
        `;
      }).join('');
    }

    // 更新进度
    function updateProgress() {
      const progressBar = document.getElementById('progress-bar');
      
      // 如果有当前故事数据，使用总节点数计算进度
      if (currentStory && currentStory.totalNodes) {
        const progress = Math.min((readingHistory.length / currentStory.totalNodes) * 100, 100);
        progressBar.style.width = `${progress}%`;
      } else {
        // 否则根据阅读历史长度估算（假设平均故事有10个节点）
        const estimatedTotalNodes = 10;
        const progress = Math.min((readingHistory.length / estimatedTotalNodes) * 100, 100);
      progressBar.style.width = `${progress}%`;
      }
    }

    // 字体大小管理
    function applyFontSize() {
      const contentEl = document.getElementById('story-content');
      contentEl.classList.remove('text-base', 'text-lg', 'text-xl');
      
      switch (fontSize) {
        case 'small':
          contentEl.classList.add('text-base');
          break;
        case 'medium':
          contentEl.classList.add('text-lg');
          break;
        case 'large':
          contentEl.classList.add('text-xl');
          break;
      }
    }

    // 事件监听器
    document.addEventListener('DOMContentLoaded', async () => {
      // 初始化AuthUI
      if (typeof AuthUI !== 'undefined') {
        AuthUI.init({
          desktopContainer: 'auth-area-desktop',
          mobileContainer: 'auth-area-mobile',
          showAvatar: true,
          showName: true,
          avatarSize: 'medium'
        });
      }
      
      // 根据用户角色更新导航栏
      if (typeof updateNavigationByRole === 'function') {
        setTimeout(updateNavigationByRole, 300);
      }
      
      // 初始化
      const params = getUrlParams();
      if (!params.storyId) {
        showNotification('缺少故事ID', 'error');
        const contentEl = document.getElementById('story-content');
        contentEl.innerHTML = `
          <div class="text-center py-12">
            <i class="fa fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
            <p class="text-red-600 mb-2">缺少故事ID</p>
            <p class="text-sm text-slate-500 mb-4">请在URL中包含故事ID参数</p>
            <a href="browse.html" class="inline-block px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
              返回故事列表
            </a>
          </div>
        `;
        return;
      }
      
      // 先加载故事基本信息
      await loadStoryData(params.storyId);
      
      // 然后加载节点
      await loadNode(params.storyId, params.nodeId || 'root');
      
      // 埋点：记录进入故事的起始节点（首次阅读）
      if (currentNode) {
        recordReadEvent(null, currentNode.id || currentNode._id || currentNode.temporaryId, null);
      }
      
      // 初始化并加载评论区
      initCommentUI();
      loadComments(1, false);
      loadStoryRating();
      
      // 导出下拉：点击按钮开合、选择格式后导出、点击空白处关闭
      const exportBtn = document.getElementById('export-btn');
      const exportMenu = document.getElementById('export-menu');
      if (exportBtn && exportMenu) {
        exportBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          exportMenu.classList.toggle('hidden');
        });
        document.querySelectorAll('.export-option').forEach(opt => {
          opt.addEventListener('click', () => {
            exportMenu.classList.add('hidden');
            exportStory(opt.dataset.format);
          });
        });
        document.addEventListener('click', (e) => {
          if (!document.getElementById('export-wrap').contains(e.target)) {
            exportMenu.classList.add('hidden');
          }
        });
      }
      
      // 返回按钮
      document.getElementById('back-btn').addEventListener('click', () => {
        window.history.back();
      });
      
      // 字体大小按钮
      document.getElementById('font-size-btn').addEventListener('click', () => {
        document.getElementById('font-size-modal').classList.remove('hidden');
      });
      
      // 字体大小选择
      document.querySelectorAll('[data-size]').forEach(btn => {
        btn.addEventListener('click', () => {
          fontSize = btn.dataset.size;
          applyFontSize();
          
          // 更新按钮状态
          document.querySelectorAll('[data-size]').forEach(b => {
            b.classList.remove('border', 'border-primary');
          });
          btn.classList.add('border', 'border-primary');
          
          document.getElementById('font-size-modal').classList.add('hidden');
        });
      });
      
      // 关闭字体模态框
      document.getElementById('close-font-modal').addEventListener('click', () => {
        document.getElementById('font-size-modal').classList.add('hidden');
      });
      
      // 主题切换
      document.getElementById('theme-btn').addEventListener('click', () => {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark');
        showNotification(isDarkMode ? '已切换到深色模式' : '已切换到浅色模式', 'info');
      });
      
      // 重新开始
      document.getElementById('restart-btn').addEventListener('click', () => {
        if (confirm('确定要重新开始阅读吗？这将清除当前的阅读进度。')) {
        readingHistory = [];
        const params = getUrlParams();
        loadNode(params.storyId, 'root');
          showNotification('已重新开始', 'info');
        }
      });
      
      // 收藏按钮
      document.getElementById('bookmark-btn').addEventListener('click', () => {
        const icon = document.querySelector('#bookmark-btn i');
        if (icon.classList.contains('fa-bookmark-o')) {
          icon.classList.remove('fa-bookmark-o');
          icon.classList.add('fa-bookmark');
          showNotification('已添加书签', 'success');
        } else {
          icon.classList.remove('fa-bookmark');
          icon.classList.add('fa-bookmark-o');
          showNotification('已移除书签', 'info');
        }
      });
      
      // 分享按钮
      document.getElementById('share-btn').addEventListener('click', () => {
        const url = window.location.href;
        if (navigator.share) {
          navigator.share({
            title: currentNode.title,
            text: '来阅读这个精彩的故事！',
            url: url
          });
        } else {
          navigator.clipboard.writeText(url);
          showNotification('链接已复制到剪贴板', 'success');
        }
      });
      
      // 浏览器后退/前进
      window.addEventListener('popstate', () => {
        const params = getUrlParams();
        loadNode(params.storyId, params.nodeId);
      });
    });
  </script>
</body>
</html>
