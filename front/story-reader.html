<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">故事阅读器 - StoryForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#C67B3C',
            secondary: '#6B8E7B',
            dark: '#2C1810',
            light: '#FBF7F2',
            paper: '#F5EDE3',
            ink: '#4A3728',
            muted: '#7A6B5D',
            border: '#E0D5C7',
          },
          fontFamily: {
            display: ["'Playfair Display'", "'Noto Serif SC'", 'Georgia', 'serif'],
            body: ["'Lora'", "'Noto Serif SC'", 'Georgia', 'serif'],
            sans: ['system-ui', '-apple-system', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style>
    /* 阅读器专属：书页质感 */
    .reader-page {
      background: #FFFBF5;
      border: 1px solid #E8DDD0;
      box-shadow: 0 2px 16px rgba(44,24,16,0.06), 0 0 0 1px rgba(44,24,16,0.03);
      position: relative;
    }
    .reader-page::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, rgba(198,123,60,0.3), transparent 60%);
    }
    .reader-content {
      font-family: var(--font-body);
      font-size: 1.125rem;
      line-height: 2;
      color: var(--color-ink);
      padding-left: 0.5rem;
    }
    .reader-content p {
      text-indent: 2em;
      margin-bottom: 1.25rem;
    }
    .reader-content p:first-child {
      text-indent: 0;
    }
    .reader-content p:first-child::first-letter {
      font-family: var(--font-display);
      font-size: 3.5rem;
      float: left;
      line-height: 0.85;
      padding-right: 0.375rem;
      padding-top: 0.125rem;
      color: var(--color-amber);
      font-weight: 700;
    }

    .choice-card {
      background: #FFFBF5;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      position: relative;
    }
    .choice-card:hover {
      border-color: var(--color-amber);
      background: #FFF8F0;
      box-shadow: 0 2px 12px rgba(198,123,60,0.1);
      transform: translateX(4px);
    }
    .choice-card .choice-letter {
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #C67B3C, #8B5E3C);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .progress-bar-bg {
      background: var(--color-paper);
      border-radius: 999px;
      overflow: hidden;
      height: 6px;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #C67B3C, #8B5E3C);
      transition: width 0.5s var(--ease-out);
    }

    /* 深色阅读模式 */
    html.dark .reader-page { background: #261E18; border-color: #3D3028; }
    html.dark .reader-page::before { background: linear-gradient(180deg, rgba(198,123,60,0.4), transparent 60%); }
    html.dark .reader-content { color: #E0D5C7; }
    html.dark .choice-card { background: #261E18; border-color: #3D3028; }
    html.dark .choice-card:hover { background: #2C221A; border-color: var(--color-amber); }
    html.dark .progress-bar-bg { background: #3D3028; }
  </style>
</head>

      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-4">
        <div class="flex-1">
          <h1 id="story-title" class="display-lg mb-3">加载中...</h1>
          <div id="story-meta" class="flex flex-wrap items-center gap-3 text-sm text-muted">
            <span id="author-info"><i class="fa fa-user-circle-o mr-1"></i> 加载中...</span>
            <span class="w-1 h-1 rounded-full" style="background:var(--color-border);"></span>
            <span id="category-info"><i class="fa fa-tag mr-1"></i> 加载中...</span>
            <span class="w-1 h-1 rounded-full" style="background:var(--color-border);"></span>
            <span id="created-time"><i class="fa fa-calendar mr-1"></i> 加载中...</span>
          </div>
          <div class="flex items-center gap-4 text-xs text-muted mt-2">
            <span id="node-info"><i class="fa fa-code-fork mr-1"></i> 节点 1</span>
            <span id="reading-time"><i class="fa fa-clock-o mr-1"></i> 约1分钟阅读</span>

        <div class="flex items-center gap-2">

        </div>
      </div>

        <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
      </div>
    </header>

    <!-- 故事内容 — 书页 -->
    <section class="reader-page rounded-xl p-6 md:p-10 mb-8 animate-fade-in-up stagger-1">
      <article id="story-content" class="reader-content">
        <div class="flex items-center justify-center py-16">
          <div class="animate-spin rounded-full h-8 w-8 border-2" style="border-color:var(--color-border);border-top-color:var(--color-amber);"></div>
          <span class="ml-3 text-muted">正在加载故事内容...</span>
        </div>

    <section id="choices-section" class="mb-8 hidden animate-fade-in-up stagger-2">

    <!-- 导航区域 -->
    <nav id="navigation-section" class="mb-8 hidden animate-fade-in-up stagger-3">

  <!-- 字体大小选择器 -->
  <div id="font-size-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center" style="background:rgba(44,24,16,0.5);">
    <div class="card p-6 max-w-sm w-full mx-4">
      <h3 class="display-md mb-4">字体大小</h3>
      <div class="space-y-2">
        <button class="w-full p-3 text-left rounded-lg hover:bg-paper transition-colors text-sm" data-size="small">小号字体</button>
        <button class="w-full p-3 text-left rounded-lg hover:bg-paper transition-colors" data-size="medium" style="border:1px solid var(--color-amber);">中号字体（默认）</button>
        <button class="w-full p-3 text-left rounded-lg hover:bg-paper transition-colors text-lg" data-size="large">大号字体</button>
      </div>
      <button id="close-font-modal" class="btn btn-secondary w-full mt-4 justify-center">关闭</button>
    </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/reading-history.js"></script>
  <script>
    // 恢复主题
    if (typeof ReadingHistory !== 'undefined') { ReadingHistory.applyTheme(); }

    AuthUI.init();
    var mobileMenuButton = document.getElementById('mobile-menu-button');
    var mobileMenu = document.getElementById('mobile-menu');
    if (mobileMenuButton && mobileMenu) {
      mobileMenuButton.addEventListener('click', function() { mobileMenu.classList.toggle('hidden'); });
    }

    var currentStory = null;
    var currentNode = null;
    var readingHistory = [];
    var fontSize = 'medium';
    var isDarkMode = false;

    function getUrlParams() {
      var params = new URLSearchParams(window.location.search);
      return { storyId: params.get('storyId') || params.get('id'), nodeId: params.get('node') || 'root' };
    }

    function updateUrl(storyId, nodeId) {
      var url = new URL(window.location);
      url.searchParams.set('id', storyId);
      url.searchParams.set('node', nodeId);
      window.history.pushState({}, '', url);
    }

    function showNotification(message, type) {
      type = type || 'info';
      var note = document.createElement('div');
      note.className = 'fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 flex items-center text-sm transition-all duration-300 transform translate-y-10 opacity-0';
      note.style.fontFamily = 'var(--font-ui)';
      if (type === 'success') {
        note.style.background = 'var(--color-sage-pale)'; note.style.color = 'var(--color-sage)'; note.style.border = '1px solid var(--color-sage)';
      } else if (type === 'error') {
        note.style.background = 'var(--color-clay-light)'; note.style.color = 'var(--color-clay)';
      } else {
        note.style.background = 'var(--color-amber-glow)'; note.style.color = 'var(--color-amber-dark)';
      }
      note.innerHTML = '<i class="fa ' + (type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle') + ' mr-2"></i>' + message;
      document.body.appendChild(note);
      setTimeout(function() { note.classList.remove('translate-y-10', 'opacity-0'); }, 10);
      setTimeout(function() { note.classList.add('translate-y-10', 'opacity-0'); setTimeout(function() { note.remove(); }, 300); }, 3000);
    }

    async function loadStoryData(storyId) {
      try {
        var response = await fetch('http://localhost:5000/api/v1/stories/' + storyId);
        if (!response.ok) throw new Error('故事不存在');
        var data = await response.json();
        if (data.success && data.data) {
          currentStory = data.data;
          document.getElementById('page-title').textContent = (currentStory.title || '故事') + ' - StoryForge';
          updateStoryHeader(currentStory);
          if (currentStory.nodes && Array.isArray(currentStory.nodes)) {
            currentStory.totalNodes = currentStory.nodes.length;
          }
          return currentStory;
        }
        return null;
      } catch (error) {
        console.error('加载故事数据失败:', error);
        showNotification('加载故事失败: ' + error.message, 'error');
        return null;
      }
    }

    function updateStoryHeader(story) {
      var authorName = story.author ? (story.author.username || story.author.name || '未知作者') : '未知作者';
      document.getElementById('author-info').innerHTML = '<i class="fa fa-user-circle-o mr-1"></i> ' + escapeHtml(authorName);
      var categoryName = story.category ? (story.category.name || '未分类') : '未分类';
      document.getElementById('category-info').innerHTML = '<i class="fa fa-tag mr-1"></i> ' + escapeHtml(categoryName);
      if (story.createdAt) {
        var date = new Date(story.createdAt);
        document.getElementById('created-time').innerHTML = '<i class="fa fa-calendar mr-1"></i> ' + date.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
      }
    }

    async function loadStoryNodes(storyId) {
      try {
        var token = localStorage.getItem('token') || sessionStorage.getItem('token');
        var headers = { 'Content-Type': 'application/json' };
        if (token) {
          var cleanToken = token.startsWith('Bearer ') ? token.substring(7) : token;
          headers['Authorization'] = 'Bearer ' + cleanToken;
        }
        var response = await fetch('http://localhost:5000/api/v1/storyNodes/public/stories/' + storyId + '/nodes', { headers: headers });
        if (!response.ok) throw new Error('无法加载故事节点');
        var result = await response.json();
        if (result.success) return result.data;
        throw new Error(result.message || '加载节点失败');
      } catch (error) {
        console.error('加载故事节点失败:', error);
        showNotification('加载故事节点失败', 'error');
        return [];
      }
    }

    async function loadNode(storyId, nodeId) {
      try {
        var contentEl = document.getElementById('story-content');
        contentEl.innerHTML = '<div class="flex items-center justify-center py-16"><div class="animate-spin rounded-full h-8 w-8 border-2" style="border-color:var(--color-border);border-top-color:var(--color-amber);"></div><span class="ml-3 text-muted">正在加载节点内容...</span></div>';

        var nodes = await loadStoryNodes(storyId);
        if (!nodes || nodes.length === 0) throw new Error('没有找到故事节点');

        var targetNode = null;
        if (nodeId === 'root' || nodeId === null || nodeId === undefined) {
          targetNode = nodes.find(function(n) { return n.isRoot === true || n.isRoot === 1; });
          if (!targetNode) targetNode = nodes.find(function(n) { return !n.parentId; });
          if (!targetNode) targetNode = nodes[0];
        } else {
          targetNode = nodes.find(function(n) {
            return n.id === nodeId || n._id === nodeId || n.temporaryId === nodeId || String(n.id) === String(nodeId);
          });
        }
        if (!targetNode) throw new Error('节点不存在');

        currentNode = targetNode;

        var existingIndex = -1;
        for (var i = 0; i < readingHistory.length; i++) {
          if (readingHistory[i].nodeId === targetNode.id || readingHistory[i].nodeId === targetNode._id || readingHistory[i].nodeId === targetNode.temporaryId) {
            existingIndex = i; break;
          }
        }
        if (existingIndex === -1) {
          readingHistory.push({ nodeId: targetNode.id || targetNode._id || targetNode.temporaryId, title: targetNode.title, timestamp: new Date() });
        } else if (existingIndex < readingHistory.length - 1) {
          readingHistory = readingHistory.slice(0, existingIndex + 1);
        }

        updateUrl(storyId, targetNode.id || targetNode._id || targetNode.temporaryId);
        renderNode(targetNode);
        updateNavigation();
        updateProgress();
      } catch (error) {
        console.error('加载节点失败:', error);
        showNotification('加载节点失败: ' + error.message, 'error');
        document.getElementById('story-content').innerHTML = '<div class="text-center py-12"><i class="fa fa-exclamation-circle text-4xl mb-4" style="color:var(--color-clay);"></i><p class="font-semibold mb-1" style="color:var(--color-clay);">加载节点失败</p><p class="text-sm text-muted">' + error.message + '</p><button onclick="location.reload()" class="btn btn-primary mt-4">重新加载</button></div>';
      }
    }

    function renderNode(node) {
      document.getElementById('page-title').textContent = (node.title || '未命名节点') + ' - StoryForge';
      document.getElementById('story-title').textContent = node.title || '未命名节点';
      document.getElementById('node-info').innerHTML = '<i class="fa fa-code-fork mr-1"></i> 节点 ' + (node.order || readingHistory.length || 1);

      var contentLength = node.content ? node.content.length : 0;
      var readingMinutes = Math.max(1, Math.ceil(contentLength / 300));
      document.getElementById('reading-time').innerHTML = '<i class="fa fa-clock-o mr-1"></i> 约' + readingMinutes + '分钟阅读';

      var contentEl = document.getElementById('story-content');
      if (node.content && node.content.trim()) {
        var paragraphs = node.content.split('\n').filter(function(l) { return l.trim(); });
        var html = '';
        for (var i = 0; i < paragraphs.length; i++) {
          html += '<p>' + escapeHtml(paragraphs[i]) + '</p>';
        }
        contentEl.innerHTML = html;
      } else {
        contentEl.innerHTML = '<div class="text-center py-12 text-muted"><i class="fa fa-file-text-o text-4xl mb-4"></i><p>暂无内容</p></div>';
      }

      renderChoices(node);

      if (node.type === 'end' || !node.choices || node.choices.length === 0) {
        document.getElementById('choices-section').classList.add('hidden');
        if (node.type === 'end') {
          var endBanner = document.createElement('div');
          endBanner.className = 'mt-8 p-6 rounded-xl text-center reader-page';
          endBanner.innerHTML = '<i class="fa fa-flag-checkered text-3xl mb-3" style="color:var(--color-amber);"></i><h3 class="display-md mb-2">故事结束</h3><p class="text-muted">感谢阅读这个故事！</p>';
          contentEl.appendChild(endBanner);
        }
      }

      applyFontSize();

      if (currentStory && currentNode && typeof ReadingHistory !== 'undefined') {
        var totalNodes = (currentStory.nodes && currentStory.nodes.length) || currentStory.totalNodes || 0;
        ReadingHistory.saveProgress(
          currentStory.id || currentStory._id,
          currentStory.title || '未命名故事',
          currentNode.id || currentNode._id || currentNode.temporaryId,
          currentNode.title || '',
          totalNodes
        );
      }
    }

    function escapeHtml(text) {
      var map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function renderChoices(node) {
      var choicesSection = document.getElementById('choices-section');
      var choicesContainer = document.getElementById('choices-container');
      var choices = node.choices || [];
      if (choices.length === 0 || node.type === 'end') { choicesSection.classList.add('hidden'); return; }
      choicesSection.classList.remove('hidden');
      choicesContainer.innerHTML = '';

      choices.forEach(function(choice, index) {
        var card = document.createElement('div');
        card.className = 'choice-card';
        var choiceText = choice.text || choice.context || '继续';
        var targetNodeId = choice.targetNodeId || choice.target_node_id;
        card.innerHTML =
          '<div class="flex items-start gap-4">' +
            '<div class="choice-letter">' + String.fromCharCode(65 + index) + '</div>' +
            '<div class="flex-1">' +
              '<h3 class="font-display font-semibold text-lg mb-1" style="color:var(--color-ink);">' + escapeHtml(choiceText) + '</h3>' +
              (choice.description ? '<p class="text-sm text-muted">' + escapeHtml(choice.description) + '</p>' : '') +
              (choice.targetNode && choice.targetNode.title ? '<p class="text-xs text-muted mt-2"><i class="fa fa-long-arrow-right mr-1"></i>' + escapeHtml(choice.targetNode.title) + '</p>' : '') +
            '</div>' +
            '<i class="fa fa-chevron-right text-muted text-lg flex-shrink-0 self-center"></i>' +
          '</div>';

        card.addEventListener('click', function() {
          if (targetNodeId) {
            card.style.opacity = '0.6';
            handleChoice(choice, node);
          } else {
            showNotification('该选择暂无后续内容', 'info');
          }
        });
        choicesContainer.appendChild(card);
      });
    }

    async function handleChoice(choice, currentNode) {
      var targetNodeId = choice.targetNodeId || choice.target_node_id;
      if (!targetNodeId) { showNotification('该选择暂无后续内容', 'info'); return; }
      var params = getUrlParams();
      showNotification('正在加载下一个节点...', 'info');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      await loadNode(params.storyId, targetNodeId);
    }

    function updateNavigation() {
      var navSection = document.getElementById('navigation-section');
      var prevBtn = document.getElementById('prev-node-btn');
      if (readingHistory.length > 1) { navSection.classList.remove('hidden'); }
      else { navSection.classList.add('hidden'); }
      if (readingHistory.length <= 1) { prevBtn.disabled = true; prevBtn.style.opacity = '0.5'; }
      else {
        prevBtn.disabled = false; prevBtn.style.opacity = '1';
        prevBtn.onclick = function() {
          readingHistory.pop();
          var prevNode = readingHistory[readingHistory.length - 1];
          if (prevNode) { var params = getUrlParams(); loadNode(params.storyId, prevNode.nodeId); }
        };
      }
      var displayHistory = readingHistory.slice(-5);
      var pathIndicator = document.getElementById('path-indicator');
      pathIndicator.innerHTML = displayHistory.map(function(item, idx) {
        var actualIdx = readingHistory.length - displayHistory.length + idx;
        var isLast = actualIdx === readingHistory.length - 1;
        var dot = isLast ? 'w-3 h-3 rounded-full' : 'w-2 h-2 rounded-full';
        var dotStyle = isLast ? 'background:var(--color-amber);box-shadow:0 0 0 2px var(--color-amber-glow);' : 'background:var(--color-border);';
        return '<div class="flex items-center gap-1" title="' + escapeHtml(item.title || '节点') + '"><div class="' + dot + '" style="' + dotStyle + '"></div>' + (idx < displayHistory.length - 1 ? '<i class="fa fa-chevron-right text-xs text-muted"></i>' : '') + '</div>';
      }).join('');
    }

    function updateProgress() {
      var bar = document.getElementById('progress-bar');
      if (currentStory && currentStory.totalNodes) {
        bar.style.width = Math.min(Math.round((readingHistory.length / currentStory.totalNodes) * 100), 100) + '%';
      } else {
        bar.style.width = Math.min(readingHistory.length * 10, 100) + '%';
      }
    }

    function applyFontSize() {
      var el = document.getElementById('story-content');
      el.style.fontSize = fontSize === 'small' ? '1rem' : fontSize === 'large' ? '1.25rem' : '1.125rem';
    }

    document.addEventListener('DOMContentLoaded', async function() {
      if (typeof ReadingHistory !== 'undefined') { ReadingHistory.applyTheme(); }
      if (typeof AuthUI !== 'undefined') { AuthUI.init({ desktopContainer:'auth-area-desktop', mobileContainer:'auth-area-mobile', showAvatar:true, showName:true, avatarSize:'medium' }); }
      if (typeof updateNavigationByRole === 'function') { setTimeout(updateNavigationByRole, 300); }

      var params = getUrlParams();
      if (!params.storyId) {
        document.getElementById('story-content').innerHTML = '<div class="text-center py-12"><i class="fa fa-exclamation-circle text-4xl mb-4" style="color:var(--color-clay);"></i><p class="font-semibold mb-1" style="color:var(--color-clay);">缺少故事ID</p><p class="text-sm text-muted mb-4">请在URL中包含故事ID参数</p><a href="browse.html" class="btn btn-primary">返回故事列表</a></div>';
        return;
      }

      await loadStoryData(params.storyId);
      await loadNode(params.storyId, params.nodeId || 'root');

      document.getElementById('back-btn').addEventListener('click', function() { window.history.back(); });
      document.getElementById('font-size-btn').addEventListener('click', function() { document.getElementById('font-size-modal').classList.remove('hidden'); });
      document.querySelectorAll('[data-size]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          fontSize = btn.dataset.size;
          applyFontSize();
          document.querySelectorAll('[data-size]').forEach(function(b) { b.style.border = 'none'; });
          btn.style.border = '1px solid var(--color-amber)';
          document.getElementById('font-size-modal').classList.add('hidden');
        });
      });
      document.getElementById('close-font-modal').addEventListener('click', function() { document.getElementById('font-size-modal').classList.add('hidden'); });

      // 主题切换
      document.getElementById('theme-btn').addEventListener('click', function() {
        if (typeof ReadingHistory !== 'undefined') {
          var theme = ReadingHistory.toggleTheme();
          var icon = document.querySelector('#theme-btn i');
          icon.className = theme === 'dark' ? 'fa fa-sun-o' : 'fa fa-moon-o';
          showNotification(theme === 'dark' ? '已切换到深色模式' : '已切换到浅色模式', 'info');
        }
      });
      // 初始化图标
      if (typeof ReadingHistory !== 'undefined' && ReadingHistory.getTheme() === 'dark') {
        document.querySelector('#theme-btn i').className = 'fa fa-sun-o';
      }

      document.getElementById('restart-btn').addEventListener('click', function() {
        if (confirm('确定要重新开始阅读吗？这将清除当前的阅读进度。')) {
          readingHistory = [];
          var p = getUrlParams();
          loadNode(p.storyId, 'root');
          showNotification('已重新开始', 'info');
        }
      });

      document.getElementById('bookmark-btn').addEventListener('click', function() {
        var icon = document.querySelector('#bookmark-btn i');
        if (icon.classList.contains('fa-bookmark-o')) { icon.classList.remove('fa-bookmark-o'); icon.classList.add('fa-bookmark'); showNotification('已添加书签', 'success'); }
        else { icon.classList.remove('fa-bookmark'); icon.classList.add('fa-bookmark-o'); showNotification('已移除书签', 'info'); }
      });

      document.getElementById('share-btn').addEventListener('click', function() {
        var url = window.location.href;
        if (navigator.share) { navigator.share({ title: currentNode ? currentNode.title : '', text: '来阅读这个精彩的故事！', url: url }); }
        else { navigator.clipboard.writeText(url); showNotification('链接已复制到剪贴板', 'success'); }
      });

      window.addEventListener('popstate', function() {
        var p = getUrlParams();
        loadNode(p.storyId, p.nodeId);
      });
    });
  </script>
</body>
</html>
