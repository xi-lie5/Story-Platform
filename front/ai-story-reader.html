<style>
:root { --bg: #0a0a14; --accent: #818cf8; --surface: rgba(255,255,255,0.04); }
* { box-sizing: border-box; }
body { background: var(--bg); min-height: 100vh; color: #d1d5db; font-family: Georgia, "Noto Serif SC", serif; margin: 0; padding: 0; }
/* Nav */
.nav { position: sticky; top: 0; z-index: 50; background: rgba(10,10,20,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; }
.nav-brand { display: flex; align-items: center; gap: 0.5rem; color: #e2e8f0; text-decoration: none; font-weight: 700; font-size: 1.1rem; font-family: system-ui, sans-serif; }
.nav-brand i { color: var(--accent); }
.nav-links { display: flex; gap: 1.25rem; align-items: center; font-family: system-ui, sans-serif; }
.nav-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: #e2e8f0; }
/* Reader */
.container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 10rem; }
.story-header { text-align: center; margin-bottom: 1rem; }
.badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 6px; font-size: 0.7rem; background: rgba(99,102,241,0.2); color: #a5b4fc; font-family: system-ui, sans-serif; text-transform: uppercase; letter-spacing: 0.1em; }
.title { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; margin: 0.75rem 0 0.25rem; }
.subtitle { font-size: 0.8rem; color: #64748b; font-family: system-ui, sans-serif; }
.toolbar { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
.toolbar button { padding: 0.4rem 0.9rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--surface); color: #94a3b8; cursor: pointer; font-size: 0.8rem; font-family: system-ui, sans-serif; transition: all 0.15s; }
.toolbar button:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
/* Content */
.story-content { font-size: 1.1rem; line-height: 2; white-space: pre-wrap; }
.chapter-title { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; margin-bottom: 1.5rem; text-align: center; }
/* Choices */
.choices-panel { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(10,10,20,0.97) 20%, rgba(10,10,20,1)); padding: 1.5rem 1.25rem 2rem; z-index: 10; }
.choices-panel::before { content: ""; display: block; height: 1px; background: linear-gradient(90deg, transparent, rgba(129,140,248,0.3), transparent); margin-bottom: 1rem; }
.choice-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.5rem; font-family: system-ui, sans-serif; }
.choice-btn { display: block; width: 100%; text-align: left; padding: 0.85rem 1.1rem; margin-bottom: 0.5rem; border-radius: 10px; border: 1px solid rgba(129,140,248,0.15); background: rgba(129,140,248,0.05); color: #d1d5db; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; font-family: system-ui, sans-serif; }
.choice-btn:hover { border-color: var(--accent); background: rgba(129,140,248,0.1); }
.choice-btn:active { transform: scale(0.98); }
.choice-btn[disabled] { opacity: 0.55; cursor: wait; }
.choice-btn.processing { border-color: var(--accent); background: rgba(129,140,248,0.18); color: #fff; }
.feedback-toast { position: fixed; left: 50%; bottom: 8.5rem; transform: translateX(-50%); max-width: min(92vw, 720px); background: rgba(220,38,38,0.95); color: #fff; padding: 0.75rem 1rem; border-radius: 10px; z-index: 30; font-family: system-ui, sans-serif; font-size: 0.86rem; box-shadow: 0 12px 32px rgba(0,0,0,0.35); display: none; }
/* Loading */
.loading { text-align: center; padding: 3rem 1rem; }
.dots { display: inline-flex; gap: 0.3rem; margin-top: 0.75rem; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(129,140,248,0.5); animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.5s ease-out; }
.error { color: #f87171; text-align: center; padding: 2rem; font-family: system-ui, sans-serif; }
.error button { margin-top: 1rem; padding: 0.5rem 1.25rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: var(--surface); color: #e2e8f0; cursor: pointer; font-family: system-ui, sans-serif; }
/* Skip hint */
.skip-hint { text-align: center; font-size: 0.75rem; color: #475569; margin-top: 0.5rem; font-family: system-ui, sans-serif; opacity: 0.7; }
#storyText { cursor: pointer; }
#storyText:hover .skip-hint { opacity: 1; }
</style>
</head>

</nav>

      <input type="text" id="freeInput" placeholder="Or type your own action..." style="flex:1;padding:0.6rem 0.8rem;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#d1d5db;font-size:0.85rem;outline:none;font-family:system-ui,sans-serif" onkeydown="if(event.key==='Enter')submitFreeChoice()">
      <button onclick="submitFreeChoice()" style="padding:0.6rem 1rem;border-radius:8px;border:1px solid rgba(129,140,248,0.3);background:rgba(129,140,248,0.1);color:#a5b4fc;cursor:pointer;font-size:0.85rem;font-family:system-ui,sans-serif;white-space:nowrap"><i class="fas fa-arrow-right"></i></button>

<script>
// ──────────── AI Story Reader ────────────
var storyId = null;
var currentNodeId = null;
var currentContent = '';
var currentNodeTitle = '';
var readingHistory = [];
var currentChoices = [];
var typewriterTimer = null;
var storyEnded = false; // 故事是否已完结（当前节点为结局节点）

document.addEventListener('DOMContentLoaded', function() {
  AuthUI.init();
  if (!AuthUI.getAuthState()) {
    AuthUI.goToLogin();
    return;
  }
  if (typeof updateNavigationByRole === 'function') {
    setTimeout(updateNavigationByRole, 300);
  }
  var mobileBtn = document.getElementById('mobile-menu-button');
  var mobileMenu = document.getElementById('mobile-menu');
  if (mobileBtn && mobileMenu) {
    mobileBtn.addEventListener('click', function() { mobileMenu.classList.toggle('hidden'); });
  }

  // 窗口尺寸变化时重新计算正文底部留白，保持选项面板不遮挡正文
  window.addEventListener('resize', function() {
    if (document.getElementById('choicesPanel').style.display !== 'none') adjustContentPadding();
  });

  var params = new URLSearchParams(window.location.search);
  storyId = params.get('storyId');
  if (!storyId) {
    document.getElementById('contentArea').innerHTML = '<div class="error">Missing story ID in URL</div>';
    return;
  }
  loadStoryMeta();
  loadSession();
});

// ── Load session ──
async function loadSession() {
  try {
    var res = await API_CONFIG.get(API_CONFIG.buildUrl('/aiStory/story/' + storyId + '/session'));
    if (!res.success || !res.data || !res.data.currentNode) {
      document.getElementById('contentArea').innerHTML = '<div class="error">No story session found.<br><small>Create a story in AI Workshop first.</small></div>';
      document.getElementById('storyTitle').textContent = 'No Story';
      return;
    }
    var node = res.data.currentNode;
    currentNodeId = node.id;
    currentContent = node.content;
    currentNodeTitle = node.title;
    currentChoices = Array.isArray(res.data.currentChoices) ? res.data.currentChoices : [];
    // 若当前节点是结局节点（type='end'），标记故事已完结，稍后展示完结面板
    storyEnded = (node.type === 'end');
    document.getElementById('storyTitle').textContent = currentNodeTitle;
    document.getElementById('progressText').textContent = 'Explored ' + (res.data.session.totalNodes || 1) + ' nodes';
    document.getElementById('toolbar').style.display = 'flex';
    // 埋点：记录进入故事时所处的当前节点
    recordReadEvent(null, currentNodeId, null);
    renderContent();
  } catch(e) {
    document.getElementById('contentArea').innerHTML = '<div class="error">Failed to load story.<br><small>' + escapeHtml(e.message) + '</small><br><button onclick="loadSession()">Retry</button></div>';
    document.getElementById('storyTitle').textContent = 'Error';
  }
}

async function loadStoryMeta() {
  try {
    var res = await API_CONFIG.get(API_CONFIG.buildUrl('/stories/' + storyId));
    if (res.success && res.data) {
      document.getElementById('storyTitle').textContent = res.data.title || 'AI 互动故事';
    }
  } catch(e) {
    console.warn('Failed to load story meta:', e);
  }
}

// ── Render content with typewriter ──
function renderContent() {
  document.getElementById('choicesPanel').style.display = 'none';
  document.getElementById('contentArea').innerHTML = '';

  // 打字开始前先预留一段底部空间：这样打字过程中自动滚动到底部时，
  // 正文结尾不会贴到视口最底部（也就是稍后选项面板出现的位置），从根本上减少被遮挡的概率。
  // 具体高度稍后会在面板真正渲染后由 adjustContentPadding 按实际高度精修。
  var containerEl = document.querySelector('.container');
  if (containerEl) containerEl.style.paddingBottom = '440px';

  var wrapper = document.createElement('div');
  wrapper.className = 'fade-in';

  var titleEl = document.createElement('div');
  titleEl.className = 'chapter-title';
  titleEl.textContent = currentNodeTitle;
  wrapper.appendChild(titleEl);

  var contentEl = document.createElement('div');
  contentEl.className = 'story-content';
  contentEl.id = 'storyText';
  wrapper.appendChild(contentEl);

  var hintEl = document.createElement('div');
  hintEl.className = 'skip-hint';
  hintEl.textContent = 'Tap anywhere to skip';
  wrapper.appendChild(hintEl);

  document.getElementById('contentArea').appendChild(wrapper);

  // Typewriter
  if (typewriterTimer) clearInterval(typewriterTimer);
  var i = 0;
  var speed = 8;
  var textEl = document.getElementById('storyText');
  typewriterTimer = setInterval(function() {
    if (i < currentContent.length) {
      textEl.textContent += currentContent.charAt(i);
      i++;
      if (i % 120 === 0) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    } else {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      document.querySelector('.skip-hint').style.display = 'none';
      loadChoices();
    }
  }, speed);

  // Click to skip
  textEl.onclick = function() {
    if (typewriterTimer) {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      textEl.textContent = currentContent;
      document.querySelector('.skip-hint').style.display = 'none';
      loadChoices();
    }
  };
}

// ── Load choices ──
// 选项直接来自会话/续写响应（currentChoices），不再从 branches API 拉取，
// 避免加载到空的占位节点造成"无关节点"干扰
function loadChoices() {
  if (!currentNodeId) return;
  // 故事已完结：展示"全剧终"面板，不再提供选项或自由输入
  if (storyEnded) {
    showEndingPanel();
    return;
  }
  // 非完结态：确保选项标签与自由输入区可见（可能被上一次完结面板隐藏过）
  var lbl = document.getElementById('choiceLabel');
  var fw = document.getElementById('freeInputWrap');
  if (lbl) lbl.style.display = '';
  if (fw) fw.style.display = '';
  if (Array.isArray(currentChoices) && currentChoices.length > 0) {
    renderChoices(currentChoices.map(function(c) {
      return { text: c.text || 'Continue', hint: c.hint || '' };
    }));
    return;
  }
  // 没有预设选项时，保留自由输入框让读者继续推进
  document.getElementById('choicesPanel').style.display = 'block';
  document.getElementById('choicesList').innerHTML = '<div style="text-align:center;color:#64748b;padding:1rem;font-family:system-ui,sans-serif"><p style="margin-bottom:0.5rem;font-style:italic">这段故事暂告段落</p><p style="font-size:0.8rem;color:#475569">你可以输入自己的行动继续推进剧情，或返回前面的选择</p></div>';
  adjustContentPadding(true);
}

// 展示"全剧终"面板：隐藏选项标签与自由输入，仅显示结束语和出口
function showEndingPanel() {
  var label = document.getElementById('choiceLabel');
  var freeWrap = document.getElementById('freeInputWrap');
  if (label) label.style.display = 'none';
  if (freeWrap) freeWrap.style.display = 'none';
  document.getElementById('choicesList').innerHTML =
    '<div style="text-align:center;color:#cbd5e1;padding:0.5rem 0.5rem 0.25rem;font-family:system-ui,sans-serif">' +
    '<p style="font-size:1.1rem;font-weight:700;letter-spacing:0.15em;color:#a5b4fc;margin-bottom:0.35rem"><i class="fas fa-flag-checkered" style="margin-right:6px"></i>全剧终</p>' +
    '<p style="font-size:0.82rem;color:#64748b;margin-bottom:0.9rem">这个故事已经迎来结局，感谢你的旅程。</p>' +
    '<div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap">' +
    '<button onclick="goBack()" style="padding:0.5rem 1.1rem;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);color:#e2e8f0;cursor:pointer;font-size:0.85rem"><i class="fas fa-undo" style="margin-right:5px"></i>回到上一步</button>' +
    '<button onclick="window.location.href=\'my_stories.html\'" style="padding:0.5rem 1.1rem;border-radius:8px;border:1px solid rgba(129,140,248,0.3);background:rgba(129,140,248,0.12);color:#c7d2fe;cursor:pointer;font-size:0.85rem"><i class="fas fa-book" style="margin-right:5px"></i>返回我的作品</button>' +
    '</div></div>';
  document.getElementById('choicesPanel').style.display = 'block';
  adjustContentPadding(true);
}

// 根据底部固定选项面板的实际高度，动态设置正文容器的底部内边距，
// 确保正文最后几行不会被选项框遮挡（选项数量不同时面板高度也不同）。
// scrollToEnd=true 时（打字刚结束、面板刚弹出），在设置留白后把页面滚动到新底部，
// 让正文结尾恰好停在面板上方，彻底避免"选项框盖住正文最后几行"的问题。
function adjustContentPadding(scrollToEnd) {
  var panel = document.getElementById('choicesPanel');
  var container = document.querySelector('.container');
  if (!panel || !container) return;
  // 等待面板完成渲染再测量高度
  requestAnimationFrame(function() {
    var h = panel.offsetHeight || 0;
    container.style.paddingBottom = (h + 96) + 'px';
    if (scrollToEnd) {
      // 打字过程中的 smooth 平滑滚动动画可能尚未结束，单次滚动容易被打断，
      // 因此用多次延时滚动做校正，确保最终停在新底部、正文结尾露在面板上方。
      var doScroll = function() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      };
      requestAnimationFrame(doScroll);
      setTimeout(doScroll, 150);
      setTimeout(doScroll, 400);
    }
  });
}

// ── Render choices ──
function renderChoices(choices) {
  if (!choices || choices.length === 0) {
    document.getElementById('choicesPanel').style.display = 'none';
    return;
  }
  window._choices = choices;
  var html = '';
  for (var i = 0; i < choices.length; i++) {
    var ch = choices[i];
    html += '<button type="button" class="choice-btn fade-in" style="animation-delay:' + (i * 0.1) + 's" data-idx="' + i + '">' + escapeHtml(ch.text || '') + '</button>';
  }
  var list = document.getElementById('choicesList');
  list.innerHTML = html;
  // 关键修复：填充选项后必须把选项面板显示出来
  // （renderContent 开头会把面板设为 display:none，若此处不设回 block，选项框永远弹不出来）
  document.getElementById('choicesPanel').style.display = 'block';
  // 根据选项面板实际高度动态调整正文底部留白，并滚动到底部让正文结尾露在面板上方
  adjustContentPadding(true);
  list.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-idx'), 10);
      var item = window._choices && window._choices[idx];
      if (!item || this.disabled) return;
      selectChoice(item.text, this);
    });
  });
}

// Select choice
async function selectChoice(choiceText, sourceButton) {
  if (!currentNodeId) {
    showFeedback('\u5f53\u524d\u8282\u70b9\u5c1a\u672a\u52a0\u8f7d\u5b8c\u6210\uff0c\u8bf7\u7a0d\u540e\u518d\u8bd5\u3002');
    return;
  }
  if (!choiceText || !String(choiceText).trim()) {
    showFeedback('\u8bf7\u9009\u62e9\u4e00\u4e2a\u884c\u52a8\uff0c\u6216\u8f93\u5165\u81ea\u5df1\u7684\u884c\u52a8\u3002');
    return;
  }

  hideFeedback();
  var previousChoicesHtml = document.getElementById('choicesList').innerHTML;
  var previousInputValue = document.getElementById('freeInput') ? document.getElementById('freeInput').value : '';
  var fromNodeId = currentNodeId; // 记录跳转前所在节点，供埋点使用
  document.querySelectorAll('.choice-btn').forEach(function(btn) { btn.disabled = true; });
  if (sourceButton) {
    sourceButton.disabled = true;
    sourceButton.classList.add('processing');
    sourceButton.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px"></i>' + '\u6b63\u5728\u751f\u6210\u4e0b\u4e00\u6bb5...' ;
  }

  readingHistory.push({ nodeId: currentNodeId, content: currentContent, title: currentNodeTitle, choices: currentChoices });
  document.getElementById('choicesPanel').style.display = 'none';
  document.getElementById('contentArea').innerHTML = '<div class="loading fade-in"><p style="color:#94a3b8;font-family:system-ui,sans-serif;font-size:0.9rem">AI 正在根据你的选择续写...</p><p style="color:#64748b;font-family:system-ui,sans-serif;font-size:0.78rem;margin-top:0.5rem">预计需要 10-30 秒，请耐心等待</p><div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  try {
    var res = await API_CONFIG.post(API_CONFIG.buildUrl('/aiStory/story/' + storyId + '/generate'), {
      nodeId: currentNodeId,
      choice: choiceText
    }, { timeout: 180000 });
    if (res.success && res.data) {
      currentNodeId = res.data.nodeId;
      currentContent = res.data.content;
      currentNodeTitle = res.data.title;
      currentChoices = Array.isArray(res.data.choices) ? res.data.choices : [];
      storyEnded = res.data.ended === true;
      // 埋点：记录 from → to 跳转与所选行动
      recordReadEvent(fromNodeId, currentNodeId, choiceText);
      document.getElementById('storyTitle').textContent = currentNodeTitle;
      document.getElementById('progressText').textContent = 'Explored ' + (res.data.totalNodes || 1) + ' nodes';
      renderContent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    throw new Error('\u670d\u52a1\u5668\u8fd4\u56de\u6570\u636e\u5f02\u5e38');
  } catch(e) {
    var last = readingHistory.pop();
    if (last) {
      currentNodeId = last.nodeId;
      currentContent = last.content;
      currentNodeTitle = last.title;
      currentChoices = last.choices || [];
      document.getElementById('storyTitle').textContent = currentNodeTitle;
    }
    renderContent();
    setTimeout(function() {
      document.getElementById('choicesPanel').style.display = 'block';
      document.getElementById('choicesList').innerHTML = previousChoicesHtml;
      var input = document.getElementById('freeInput');
      if (input) input.value = previousInputValue;
      var btns = document.getElementById('choicesList').querySelectorAll('.choice-btn');
      for (var i = 0; i < btns.length; i++) {
        (function(button) {
          button.disabled = false;
          button.classList.remove('processing');
          button.addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-idx'), 10);
            var item = window._choices && window._choices[idx];
            if (item) selectChoice(item.text, this);
          });
        })(btns[i]);
      }
      showFeedback('\u751f\u6210\u5931\u8d25\uff1a' + (e.message || '\u672a\u77e5\u9519\u8bef') + '\u3002\u8bf7\u91cd\u8bd5\uff0c\u6216\u8f93\u5165\u4e00\u4e2a\u81ea\u5b9a\u4e49\u884c\u52a8\u3002');
    }, 0);
  }
}

// Go back
function goBack() {
  if (readingHistory.length === 0) return;
  var prev = readingHistory.pop();
  currentNodeId = prev.nodeId;
  currentContent = prev.content;
  currentNodeTitle = prev.title;
  currentChoices = prev.choices || [];
  storyEnded = false; // 回到之前的节点，脱离完结态
  document.getElementById('storyTitle').textContent = currentNodeTitle;
  document.getElementById('choicesPanel').style.display = 'none';
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 让读者主动结束故事：请求 AI 生成一个完整结局（无后续选项），并标记为结局节点
async function endStory() {
  if (!currentNodeId || storyEnded) return;
  if (!confirm('确定要结束这个故事吗？AI 将为你生成一个完整的结局，之后将无法继续推进。')) return;
  hideFeedback();
  document.querySelectorAll('.choice-btn').forEach(function(btn) { btn.disabled = true; });
  var endBtn = document.getElementById('endStoryBtn');
  if (endBtn) endBtn.disabled = true;

  readingHistory.push({ nodeId: currentNodeId, content: currentContent, title: currentNodeTitle, choices: currentChoices });
  document.getElementById('choicesPanel').style.display = 'none';
  document.getElementById('contentArea').innerHTML = '<div class="loading fade-in"><p style="color:#94a3b8;font-family:system-ui,sans-serif;font-size:0.9rem">AI 正在为你的故事撰写结局...</p><p style="color:#64748b;font-family:system-ui,sans-serif;font-size:0.78rem;margin-top:0.5rem">预计需要 10-30 秒，请耐心等待</p><div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  try {
    var res = await API_CONFIG.post(API_CONFIG.buildUrl('/aiStory/story/' + storyId + '/generate'), {
      nodeId: currentNodeId,
      endStory: true
    }, { timeout: 180000 });
    if (res.success && res.data) {
      var fromNodeId = currentNodeId;
      currentNodeId = res.data.nodeId;
      currentContent = res.data.content;
      currentNodeTitle = res.data.title;
      currentChoices = [];
      storyEnded = true;
      recordReadEvent(fromNodeId, currentNodeId, '（结束故事）');
      document.getElementById('storyTitle').textContent = currentNodeTitle;
      document.getElementById('progressText').textContent = 'Explored ' + (res.data.totalNodes || 1) + ' nodes · 已完结';
      renderContent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    throw new Error('\u670d\u52a1\u5668\u8fd4\u56de\u6570\u636e\u5f02\u5e38');
  } catch(e) {
    var last = readingHistory.pop();
    if (last) {
      currentNodeId = last.nodeId;
      currentContent = last.content;
      currentNodeTitle = last.title;
      currentChoices = last.choices || [];
    }
    storyEnded = false;
    if (endBtn) endBtn.disabled = false;
    renderContent();
    showFeedback('生成结局失败：' + (e.message || '未知错误') + '。请重试。');
  }
}

// ── Regenerate ──
async function regenerateCurrent() {
  if (!currentNodeId) return;
  document.getElementById('choicesPanel').style.display = 'none';
  document.getElementById('contentArea').innerHTML = '<div class="loading fade-in"><p style="color:#94a3b8;font-family:system-ui,sans-serif;font-size:0.9rem">Regenerating...</p><div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  try {
    var res = await API_CONFIG.post(API_CONFIG.buildUrl('/aiStory/story/' + storyId + '/generate'), { nodeId: currentNodeId, choice: '(regenerate: continue the story)' }, { timeout: 180000 });
    if (res.success) {
      currentNodeId = res.data.nodeId || currentNodeId;
      currentContent = res.data.content;
      currentNodeTitle = res.data.title;
      currentChoices = Array.isArray(res.data.choices) ? res.data.choices : [];
      renderContent();
    }
  } catch(e) {
    document.getElementById('contentArea').innerHTML = '<div class="error">Regenerate failed.<br><small>' + escapeHtml(e.message) + '</small><br><button onclick="renderContent()">Back</button></div>';
  }
}

function submitFreeChoice() {
  var input = document.getElementById('freeInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text) {
    showFeedback('\u8bf7\u8f93\u5165\u4e00\u4e2a\u884c\u52a8\uff0c\u6216\u70b9\u51fb\u4e0a\u65b9\u7684\u9009\u9879\u3002');
    return;
  }
  var button = input.parentElement ? input.parentElement.querySelector('button') : null;
  selectChoice(text, button);
  input.value = '';
}

function showFeedback(message) {
  var t = document.getElementById('feedbackToast');
  if (!t) return;
  t.textContent = message;
  t.style.display = 'block';
  clearTimeout(window._feedbackTimer);
  window._feedbackTimer = setTimeout(hideFeedback, 7000);
}

function hideFeedback() {
  var t = document.getElementById('feedbackToast');
  if (t) t.style.display = 'none';
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// 阅读埋点：记录读者在互动故事中的节点跳转（from → to + 所选行动），
// 供作者在"数据分析"中查看路径流向与热门选择。失败静默。
function recordReadEvent(fromNodeId, toNodeId, choiceText) {
  if (!storyId || !toNodeId) return;
  try {
    API_CONFIG.post(API_CONFIG.buildUrl('/stories/' + storyId + '/read-events'), {
      fromNodeId: fromNodeId != null ? String(fromNodeId) : null,
      toNodeId: String(toNodeId),
      choiceText: choiceText || null
    }).catch(function() {});
  } catch (e) { /* ignore */ }
}

// ──────────── 评论 ────────────
var aiCommentPage = 1;
var aiCommentTotalPages = 1;

function aiCurrentUser() {
  try { return (AuthUI.getAuthState() || {}).userInfo || null; } catch (e) { return null; }
}

function openComments() {
  var modal = document.getElementById('commentsModal');
  modal.style.display = 'flex';
  var user = aiCurrentUser();
  document.getElementById('aiCommentForm').style.display = user ? 'block' : 'none';
  document.getElementById('aiCommentLoginTip').style.display = user ? 'none' : 'block';
  loadAiComments(1, false);
}

function closeComments() {
  document.getElementById('commentsModal').style.display = 'none';
}

async function loadAiComments(page, append) {
  page = page || 1;
  var listEl = document.getElementById('aiCommentList');
  if (!append) listEl.innerHTML = '<div style="text-align:center;color:#64748b;padding:1.5rem;font-size:0.85rem">加载评论中…</div>';
  try {
    var res = await API_CONFIG.get(API_CONFIG.buildUrl('/stories/' + storyId + '/comments?page=' + page + '&limit=10'));
    aiCommentPage = res.pagination ? res.pagination.page : page;
    aiCommentTotalPages = res.pagination ? res.pagination.pages : 1;
    var comments = res.data || [];
    var total = res.pagination ? res.pagination.total : comments.length;
    document.getElementById('aiCommentCount').textContent = total ? '(' + total + ')' : '';
    if (!append) listEl.innerHTML = '';
    if (page === 1 && comments.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;color:#64748b;padding:1.5rem;font-size:0.85rem">还没有评论，来抢沙发吧～</div>';
    } else {
      comments.forEach(function(c) { listEl.insertAdjacentHTML('beforeend', renderAiComment(c)); });
    }
    var more = document.getElementById('aiCommentMore');
    more.style.display = aiCommentPage < aiCommentTotalPages ? 'inline-block' : 'none';
  } catch (e) {
    if (!append) listEl.innerHTML = '<div style="text-align:center;color:#f87171;padding:1.5rem;font-size:0.85rem">评论加载失败：' + escapeHtml(e.message) + '</div>';
  }
}

function renderAiComment(c) {
  var user = aiCurrentUser();
  var authorName = (c.author && c.author.username) || '用户';
  var avatar = (c.author && c.author.avatar) || '/avatar/default.png';
  if (avatar.indexOf('http') !== 0) avatar = 'http://localhost:5000' + avatar;
  var canDelete = user && (String(user.userId) === String(c.userId) || user.role === 'admin');
  var timeStr = c.createdAt ? new Date(c.createdAt).toLocaleString('zh-CN') : '';
  return '<div style="display:flex;gap:0.7rem;padding:0.8rem 0;border-bottom:1px solid rgba(255,255,255,0.05)">' +
    '<img src="' + avatar + '" onerror="this.onerror=null;this.src=\'http://localhost:5000/avatar/default.png\'" style="width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);flex-shrink:0">' +
    '<div style="flex:1;min-width:0">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem">' +
        '<span style="color:#e2e8f0;font-size:0.86rem;font-weight:600">' + escapeHtml(authorName) + '</span>' +
        '<span style="display:flex;align-items:center;gap:0.6rem"><span style="color:#64748b;font-size:0.72rem">' + escapeHtml(timeStr) + '</span>' +
        (canDelete ? '<button onclick="deleteAiComment(' + c.id + ')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:0.75rem"><i class="fas fa-trash"></i></button>' : '') +
        '</span>' +
      '</div>' +
      '<p style="color:#cbd5e1;font-size:0.85rem;margin:0.3rem 0 0;white-space:pre-wrap;word-break:break-word">' + escapeHtml(c.content || '') + '</p>' +
    '</div>' +
  '</div>';
}

async function submitAiComment() {
  var input = document.getElementById('aiCommentInput');
  var content = input.value.trim();
  if (!content) { showFeedback('请输入评论内容'); return; }
  var btn = document.getElementById('aiCommentSubmit');
  btn.disabled = true;
  try {
    await API_CONFIG.post(API_CONFIG.buildUrl('/stories/' + storyId + '/comments'), { content: content });
    input.value = '';
    loadAiComments(1, false);
  } catch (e) {
    showFeedback('发表失败：' + (e.message || '未知错误'));
  } finally {
    btn.disabled = false;
  }
}

async function deleteAiComment(commentId) {
  if (!confirm('确定删除这条评论吗？')) return;
  try {
    await API_CONFIG.delete(API_CONFIG.buildUrl('/comments/' + commentId));
    loadAiComments(1, false);
  } catch (e) {
    showFeedback('删除失败：' + (e.message || '未知错误'));
  }
}
</script>
