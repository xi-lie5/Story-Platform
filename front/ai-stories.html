<style>
body { min-height: 100vh; color: #1e293b; }
.navbar-modern { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.08); box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 50; }

.page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; }

.search-row input, .search-row select { width: 100%; padding: 0.7rem 0.95rem; border-radius: 10px; border: 1px solid #cbd5e1; background: #fff; color: #1e293b; font-size: 0.9rem; outline: none; }

.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column; box-shadow: 0 10px 24px rgba(15,23,42,0.05); min-height: 260px; }

.card-title { font-size: 1.08rem; font-weight: 700; color: #0f172a; margin-bottom: 0.4rem; }

.card-desc { font-size: 0.88rem; color: #64748b; line-height: 1.55; flex: 1; margin-bottom: 0.85rem; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.85rem; }
.card-tag { padding: 0.18rem 0.55rem; border-radius: 6px; font-size: 0.72rem; background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; }
.card-footer { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; padding-top: 0.85rem; border-top: 1px solid #e2e8f0; }
.card-stats { font-size: 0.78rem; color: #64748b; display: flex; gap: 0.8rem; }
.btn-start { display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; padding: 0.55rem 1.05rem; border-radius: 9px; border: none; background: #6366f1; color: #fff; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; text-decoration: none; }
.btn-start:hover { background: #4f46e5; transform: translateY(-1px); }
.btn-start:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; padding: 0.65rem 1rem; border-radius: 9px; border: 1px solid #cbd5e1; background: #fff; color: #475569; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.btn-secondary:hover { background: #eef2ff; border-color: #6366f1; color: #4338ca; }
.pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }

.pagination button:hover { color: #4338ca; border-color: #a5b4fc; }
.pagination button.active { background: #eef2ff; border-color: #6366f1; color: #4338ca; font-weight: 700; }
.pagination button:disabled { opacity: 0.45; cursor: not-allowed; }
.empty, .loading { text-align: center; padding: 4rem 1rem; color: #64748b; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; grid-column: 1 / -1; }
.empty i, .loading i { font-size: 2.4rem; display: block; margin-bottom: 1rem; opacity: 0.35; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.68); z-index: 100; justify-content: center; align-items: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 2rem; max-width: 720px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 22px 60px rgba(15,23,42,0.24); }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: #64748b; font-size: 1.25rem; cursor: pointer; }
.modal-close:hover { color: #0f172a; }
.modal-section { margin-bottom: 1.35rem; }
.modal-section h3 { font-size: 0.82rem; font-weight: 800; color: #4338ca; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; }
.modal-section p, .modal-section div { font-size: 0.92rem; color: #334155; line-height: 1.7; }
.rate-star { color: #cbd5e1; cursor: pointer; transition: color 0.15s, transform 0.1s; }
.rate-star:hover { transform: scale(1.15); }
.rate-star.active { color: #f59e0b; }
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
.char-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.75rem; }
.char-name { font-weight: 700; color: #0f172a; font-size: 0.9rem; }
.char-desc { font-size: 0.78rem; color: #64748b; margin-top: 0.25rem; }
.toast { display: none; position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); background: #dc2626; color: #fff; padding: 0.75rem 1.5rem; border-radius: 10px; z-index: 200; font-size: 0.85rem; box-shadow: 0 4px 16px rgba(220,38,38,0.32); }
@media (max-width: 760px) { .page-header { flex-direction: column; } .search-row { grid-template-columns: 1fr; } .card-footer { align-items: flex-start; flex-direction: column; } }
</style>

<script>
var currentPage = 1;
var totalPages = 1;
var currentSearch = '';
var currentCategory = '';

var TXT = {
  allCategories: '\u5168\u90e8\u5206\u7c7b',
  loading: '\u52a0\u8f7d\u4e2d...',
  loadingDetail: '\u52a0\u8f7d\u8be6\u60c5...',
  noPublicStories: '\u8fd8\u6ca1\u6709\u516c\u5f00\u7684 AI \u6545\u4e8b',
  createFirst: '\u53bb\u521b\u5efa\u7b2c\u4e00\u4e2a',
  unknownAuthor: '\u672a\u77e5\u4f5c\u8005',
  startAdventure: '\u5f00\u59cb\u5192\u9669',
  startMyAdventure: '\u5f00\u59cb\u6211\u7684\u5192\u9669',
  loadFailed: '\u52a0\u8f7d\u5931\u8d25',
  retry: '\u91cd\u8bd5',
  close: '\u5173\u95ed',
  author: '\u4f5c\u8005',
  adventureCount: '\u6b21\u5192\u9669',
  worldSetting: '\u4e16\u754c\u89c2\u8bbe\u5b9a',
  characters: '\u89d2\u8272\u8bbe\u5b9a',
  outline: '\u6545\u4e8b\u5927\u7eb2',
  style: '\u98ce\u683c',
  narrative: '\u53d9\u4e8b\u89c6\u89d2',
  tone: '\u6587\u98ce',
  length: '\u7bc7\u5e45',
  thirdPerson: '\u7b2c\u4e09\u4eba\u79f0',
  naturalTone: '\u81ea\u7136\u6d41\u7545',
  defaultLength: '800-1500\u5b57/\u6bb5',
  moods: '\u6c1b\u56f4\u6807\u7b7e',
  badStartResponse: '\u5f00\u59cb\u5192\u9669\u5931\u8d25: \u670d\u52a1\u5668\u8fd4\u56de\u6570\u636e\u5f02\u5e38',
  startFailed: '\u5f00\u59cb\u5192\u9669\u5931\u8d25: '
};

document.addEventListener('DOMContentLoaded', function() {
  AuthUI.init();
  if (typeof updateNavigationByRole === 'function') setTimeout(updateNavigationByRole, 300);
  var mobileBtn = document.getElementById('mobile-menu-button');
  var mobileMenu = document.getElementById('mobile-menu');
  if (mobileBtn && mobileMenu) mobileBtn.addEventListener('click', function() { mobileMenu.classList.toggle('hidden'); });
  document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  loadCategories();
  loadStories();
});

async function loadCategories() {
  var sel = document.getElementById('categoryFilter');
  sel.innerHTML = '<option value="">' + TXT.allCategories + '</option>';
  try {
    var res = await API_CONFIG.get(API_CONFIG.buildUrl('/categories'));
    var cats = res.data || [];
    cats.forEach(function(c) {
      var o = document.createElement('option');
      o.value = c.id || c._id;
      o.textContent = c.name;
      sel.appendChild(o);
    });
  } catch(e) { console.error('Categories load failed:', e); }
}

async function loadStories() {
  document.getElementById('storyGrid').innerHTML = '<div class="loading"><i class="fa fa-spinner fa-spin"></i>' + TXT.loading + '</div>';
  try {
    var params = '?page=' + currentPage + '&limit=12';
    if (currentSearch) params += '&search=' + encodeURIComponent(currentSearch);
    if (currentCategory) params += '&category=' + encodeURIComponent(currentCategory);
    var res = await API_CONFIG.get(API_CONFIG.buildUrl('/aiStory/configs' + params));
    var data = res.data;
    var stories = Array.isArray(data) ? data : (data && data.stories ? data.stories : []);
    var pagination = res.pagination || (data && data.pagination) || {};
    totalPages = pagination.pages || 1;

    if (stories.length === 0) {
      document.getElementById('storyGrid').innerHTML = '<div class="empty"><i class="fa fa-book-open"></i><p>' + TXT.noPublicStories + '</p><a href="ai-workshop.html" class="btn-start" style="margin-top:1rem">' + TXT.createFirst + '</a></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    var html = '';
    for (var i = 0; i < stories.length; i++) {
      var s = stories[i];
      var moods = (s.mood_tags || []).map(function(t) { return '<span class="card-tag">' + escHtml(t) + '</span>'; }).join('');
      var charNames = (s.characters_config || []).map(function(c) { return c.name; }).filter(Boolean).join('\u3001');
      var desc = s.description || s.start_prompt || '';
      html += '<div class="card" onclick="showDetail(\'' + s.id + '\')">';
      html += '<div class="card-title">' + escHtml(s.title) + '</div>';
      html += '<div class="card-author"><img src="' + escHtml(getAvatar(s.author_avatar, s.author_name)) + '" alt="" onerror="this.src=\'assets/img/default-avatar.png\'">' + escHtml(s.author_name || TXT.unknownAuthor) + '</div>';
      html += '<div class="card-desc">' + escHtml(desc.substring(0, 220)) + '</div>';
      if (moods || charNames) html += '<div class="card-tags">' + moods + (charNames ? '<span class="card-tag"><i class="fa fa-users mr-1"></i>' + escHtml(charNames) + '</span>' : '') + '</div>';
      html += '<div class="card-footer"><div class="card-stats"><span><i class="fa fa-eye"></i> ' + (s.view_count || 0) + '</span><span><i class="fa fa-play"></i> ' + (s.total_sessions || 0) + '</span></div>';
      html += '<button class="btn-start" onclick="event.stopPropagation();startAdv(\'' + s.id + '\')"><i class="fa fa-play"></i>' + TXT.startAdventure + '</button></div></div>';
    }
    document.getElementById('storyGrid').innerHTML = html;
    renderPagination();
  } catch(e) {
    document.getElementById('storyGrid').innerHTML = '<div class="empty"><p style="color:#dc2626">' + TXT.loadFailed + ': ' + escHtml(e.message) + '</p><button onclick="loadStories()" class="btn-start" style="margin-top:1rem">' + TXT.retry + '</button></div>';
  }
}

function renderPagination() {
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  var html = '';
  html += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage - 1) + ')"><i class="fa fa-chevron-left"></i></button>';
  for (var p = 1; p <= totalPages; p++) html += '<button class="' + (p === currentPage ? 'active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  html += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' onclick="goPage(' + (currentPage + 1) + ')"><i class="fa fa-chevron-right"></i></button>';
  document.getElementById('pagination').innerHTML = html;
}

function goPage(page) {
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  loadStories();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  currentCategory = document.getElementById('categoryFilter').value;
  currentPage = 1;
  loadStories();
}

async function showDetail(id) {
  document.getElementById('detailModal').classList.add('active');
  document.getElementById('detailContent').innerHTML = '<div class="loading" style="padding:3rem"><i class="fa fa-spinner fa-spin"></i>' + TXT.loadingDetail + '</div>';
  try {
    var res = await API_CONFIG.get(API_CONFIG.buildUrl('/aiStory/configs/' + id));
    var cfg = res.data;
    if (!cfg) { closeModal(); return; }
    var moodsHtml = (cfg.mood_tags || []).map(function(t) { return '<span class="card-tag">' + escHtml(t) + '</span>'; }).join(' ');
    var chars = cfg.characters_config || [];
    var charsHtml = '';
    for (var i = 0; i < chars.length; i++) {
      var c = chars[i];
      charsHtml += '<div class="char-item"><div class="char-name">' + escHtml(c.name) + '</div><div class="char-desc">' + escHtml((c.personality_tags || c.personalityTags || []).join('\u3001') || c.description || '') + '</div></div>';
    }
    var style = cfg.style || {};
    var html = '';
    html += '<button class="modal-close" onclick="closeModal()"><i class="fa fa-times"></i></button>';
    html += '<h2 style="font-size:1.35rem;font-weight:800;color:#0f172a;margin-bottom:0.25rem">' + escHtml(cfg.title) + '</h2>';
    html += '<p style="color:#64748b;font-size:0.86rem;margin-bottom:1.4rem">' + TXT.author + ': ' + escHtml(cfg.author_name || TXT.unknownAuthor) + ' | ' + (cfg.total_sessions || 0) + ' ' + TXT.adventureCount + '</p>';
    html += '<div class="modal-section"><h3>' + TXT.worldSetting + '</h3><p>' + escHtml(cfg.world_setting || '').replace(/\n/g, '<br>') + '</p></div>';
    if (chars.length > 0) html += '<div class="modal-section"><h3>' + TXT.characters + ' (' + chars.length + ')</h3><div class="char-grid">' + charsHtml + '</div></div>';
    if (cfg.outline) html += '<div class="modal-section"><h3>' + TXT.outline + '</h3><p>' + escHtml(cfg.outline).replace(/\n/g, '<br>') + '</p></div>';
    html += '<div class="modal-section"><h3>' + TXT.style + '</h3><p>' + TXT.narrative + ': ' + escHtml(style.narrative || TXT.thirdPerson) + '<br>' + TXT.tone + ': ' + escHtml(style.tone || TXT.naturalTone) + '<br>' + TXT.length + ': ' + escHtml(style.length || TXT.defaultLength) + '</p></div>';
    if (moodsHtml) html += '<div class="modal-section"><h3>' + TXT.moods + '</h3><div class="card-tags">' + moodsHtml + '</div></div>';
    // 星级评分组件
    var avg = cfg.avgRating || 0;
    var rc = cfg.ratingCount || 0;
    var starsHtml = '';
    for (var s = 1; s <= 5; s++) {
      starsHtml += '<i class="fa fa-star rate-star' + (s <= Math.round(avg) ? ' active' : '') + '" data-val="' + s + '" onclick="rateConfig(\'' + cfg.id + '\',' + s + ')"></i>';
    }
    html += '<div class="modal-section"><h3>为这本规则书评分</h3>' +
      '<div id="ratingStars" style="display:flex;gap:0.3rem;font-size:1.5rem">' + starsHtml + '</div>' +
      '<p id="ratingSummary" style="font-size:0.82rem;color:#64748b;margin-top:0.4rem">' +
      (rc ? ('平均 ' + avg + ' 分 · ' + rc + ' 人评分') : '暂无评分，成为第一个评分的人') + '</p></div>';
    html += '<div style="margin-top:1.5rem;text-align:center"><button class="btn-start" id="modalStartBtn" onclick="startAdv(\'' + cfg.id + '\')" style="padding:0.85rem 2.2rem;font-size:1rem"><i class="fa fa-play"></i>' + TXT.startMyAdventure + '</button></div>';
    document.getElementById('detailContent').innerHTML = html;
    // 拉取当前用户已有评分（登录时）
    if (AuthUI.getAuthState()) {
      API_CONFIG.get(API_CONFIG.buildUrl('/aiStory/configs/' + cfg.id + '/rating')).then(function(r) {
        if (r && r.success && r.data && r.data.userRating) {
          updateRatingStars(r.data.userRating, r.data.avgRating, r.data.ratingCount);
        }
      }).catch(function() {});
    }
  } catch(e) {
    document.getElementById('detailContent').innerHTML = '<div class="empty" style="padding:3rem"><p style="color:#dc2626">' + TXT.loadFailed + ': ' + escHtml(e.message) + '</p><button onclick="closeModal()" class="btn-start">' + TXT.close + '</button></div>';
  }
}

function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

// 规则书评分
var RATING_LABELS = { 1: '拉完了...', 2: '有点勉强…', 3: '一般般~', 4: '挺不错！', 5: '夯爆了！' };
async function rateConfig(configId, rating) {
  if (!AuthUI.getAuthState()) { showToast('请先登录后再评分'); return; }
  try {
    var res = await API_CONFIG.post(API_CONFIG.buildUrl('/aiStory/configs/' + configId + '/rate'), { rating: rating });
    if (res.success && res.data) {
      updateRatingStars(res.data.userRating, res.data.avgRating, res.data.ratingCount);
      showToast('评分成功：' + rating + ' 星 · ' + RATING_LABELS[rating]);
    }
  } catch (e) {
    showToast('评分失败：' + (e.message || '未知错误'));
  }
}

function updateRatingStars(userRating, avg, count) {
  var stars = document.querySelectorAll('#ratingStars .rate-star');
  var highlight = userRating || Math.round(avg || 0);
  for (var i = 0; i < stars.length; i++) {
    stars[i].classList.toggle('active', (i + 1) <= highlight);
  }
  var sum = document.getElementById('ratingSummary');
  if (sum) {
    sum.textContent = (userRating ? ('你的评分：' + userRating + ' 星 ' + RATING_LABELS[userRating] + ' · ') : '') + '平均 ' + (avg || 0) + ' 分 · ' + (count || 0) + ' 人评分';
  }
}

async function startAdv(configId) {
  var btns = document.querySelectorAll('.btn-start');
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  try {
    var res = await API_CONFIG.post(API_CONFIG.buildUrl('/aiStory/configs/' + configId + '/start'), {}, { timeout: 180000 });
    if (res.success && res.data && res.data.storyId) window.location.href = 'ai-story-reader.html?storyId=' + res.data.storyId;
    else {
      showToast(TXT.badStartResponse);
      for (var i = 0; i < btns.length; i++) btns[i].disabled = false;
    }
  } catch(e) {
    showToast(TXT.startFailed + (e.message || 'Unknown error'));
    for (var i = 0; i < btns.length; i++) btns[i].disabled = false;
  }
}

function getAvatar(avatar, name) {
  if (!avatar) return 'https://ui-avatars.com/api/?background=6366f1&color=fff&name=' + encodeURIComponent(name || 'U');
  if (/^https?:\/\//i.test(avatar)) return avatar;
  var normalized = avatar.startsWith('/') ? avatar : '/' + avatar;
  return API_CONFIG.BASE_URL + normalized;
}

function showToast(msg) {
  var t = document.getElementById('errorToast');
  if (t) { t.textContent = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 5000); }
}

function escHtml(text) {
  var d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}
</script>
